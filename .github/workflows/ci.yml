name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Check (lint + format)
        run: bunx biome check .

      - name: Type check
        run: bunx tsc --noEmit

  unit-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Install rg/fd
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Test
        run: bun test test/*.test.ts

  isolation-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Enable unprivileged user namespaces (required by bwrap on Ubuntu 24.04)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install seccomp filter
        run: |
          sudo mkdir -p /etc/seccomp/x64
          sudo cp src/sandbox/isolation/seccomp/x64/net-block.bpf /etc/seccomp/x64/net-block.bpf

      - name: Isolation tests
        run: bun test test/sandbox/isolation/isolation.test.ts

  sandbox-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Install gVisor
        run: |
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" | sudo tee /etc/apt/sources.list.d/gvisor.list > /dev/null
          sudo apt-get update && sudo apt-get install -y runsc
          sudo runsc install
          sudo systemctl restart docker

      - name: Start sandbox
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Sandbox integration tests
        run: bun test test/sandbox/sandbox.integration.test.ts

      - name: Sandbox logs
        if: failure()
        run: docker compose logs

      - name: Stop sandbox
        if: always()
        run: docker compose down

  build:
    needs: [unit-test, isolation-test, sandbox-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build
        run: bun build ./src/index.ts --outdir ./dist --target=bun

      - name: Dry-run publish to JSR
        run: bunx jsr publish --dry-run

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Publish package
        run: bunx jsr publish
